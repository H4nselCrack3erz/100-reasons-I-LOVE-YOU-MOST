<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You My Love ❤️</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #ffeef8 0%, #ffe0f0 50%, #ffd6e8 100%);
    min-height: 100vh;
    font-family: 'Segoe UI', 'Comic Sans MS', cursive;
    padding: 20px;
    overflow-x: hidden;
  }
  
  .heart {
    position: fixed;
    font-size: 20px;
    color: #ff69b4;
    animation: float 6s ease-in infinite;
    z-index: 0;
  }
  
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  h1 {
    text-align: center;
    color: #ff1493;
    font-size: 2.5rem;
    margin-bottom: 30px;
    text-shadow: 2px 2px 4px rgba(255, 182, 193, 0.5);
    animation: heartbeat 2s ease-in-out infinite;
  }
  
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .message-box {
    background: white;
    border-radius: 25px;
    padding: 25px;
    margin-bottom: 20px;
    box-shadow: 0 8px 20px rgba(255, 105, 180, 0.2);
    border: 3px solid #ffb6c1;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  
  .message-box::before {
    content: '💕';
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 1.5rem;
    animation: sparkle 2s ease-in-out infinite;
  }
  
  @keyframes sparkle {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50% { transform: scale(1.3) rotate(180deg); }
  }

  .message-box:nth-child(2n) { background: #fff0f5; border-color: #ffc0cb; }
  .message-box:nth-child(3n) { background: #ffe4e1; border-color: #ffa0c0; }
  .message-box:nth-child(4n) { background: #ffeef8; border-color: #ff91af; }

  .message-box:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 12px 30px rgba(255, 105, 180, 0.3);
  }

  .message {
    font-size: 1.2rem;
    color: #d63384;
    line-height: 1.8;
    text-align: center;
    font-weight: 500;
  }

  .footer {
    text-align: center;
    margin-top: 40px;
    color: #ff69b4;
    font-size: 1.1rem;
    font-weight: bold;
  }
</style>
</head>
<body>

<div id="hearts"></div>

<div class="container">
  <h1>For You My Love 💖</h1>
  <div id="messages"></div>
  <div class="footer">Made with 100% love and missing you every second 💕</div>
</div>

<script>
// Create floating hearts
function createHearts() {
  const heartsContainer = document.getElementById('hearts');
  for(let i = 0; i < 15; i++) {
    setTimeout(() => {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.innerHTML = ['❤️', '💕', '💖', '💗', '💓'][Math.floor(Math.random() * 5)];
      heart.style.left = Math.random() * 100 + '%';
      heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
      heart.style.animationDelay = Math.random() * 2 + 's';
      heartsContainer.appendChild(heart);
    }, i * 300);
  }
}
createHearts();

// 20 different cute messages that rotate
const messages = [
  "Every time I think of you, I smile like an idiot hehe 💕",
  "Missing you is my favorite hobby lately uwu 💖",
  "If kisses were snowflakes, I'd send you a blizzard xoxo 💗",
  "You + Me = Forever, and that's math I believe in! 💓",
  "My heart beats in morse code and it spells your name ✨",
  "I love you to the moon and back, then back again 🌙",
  "You're my favorite notification in real life hehe 📱💕",
  "Distance means nothing when someone means everything uwu 💖",
  "I was made for you and you were made for me, periodt 💞",
  "If I had a flower for every time I thought of you, I'd have a garden 🌸",
  "You're the peanut butter to my jelly, the fries to my ketchup 🍟💕",
  "I love you more than pizza, and that's saying a lot 🍕😭",
  "My heart did a backflip when I met you hehe 🤸‍♀️💖",
  "You're my sunshine on the cloudiest days ☀️💛",
  "I miss your hugs like fish miss water hehe 🐠💕",
  "If loving you was a crime, I'd be serving life uwu 🔒💖",
  "You're my once in a million, my favorite hello 💫",
  "I carry your heart with me, I carry it in my heart e.e 💝",
  "You're the sprinkles on my cupcake, the cherry on top 🍒💕",
  "I love you more than all the stars in the sky combined ✨💖"
];

const container = document.getElementById('messages');

// Generate 100 messages with rotation
for(let i = 0; i < 100; i++) {
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message-box';
  
  const randomMsg = messages[i % messages.length];
  msgDiv.innerHTML = `<div class="message">${randomMsg}</div>`;
  
  container.appendChild(msgDiv);
}
</script>

</body>
</html>
