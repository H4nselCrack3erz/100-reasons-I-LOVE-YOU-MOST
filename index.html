<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dearest Love</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<style>
body { background:#ffe6e6; font-family:'Poppins',sans-serif; padding:20px; }
#envelope { text-align:center; padding:80px 20px; cursor:pointer; }
.envelope-box { width:300px; height:200px; background:#ffb3c1; border-radius:10px; margin:0 auto; display:flex; align-items:center; justify-content:center; font-size:80px; }
#letter { display:none; max-width:700px; margin:0 auto; background:white; padding:40px; border-radius:12px; }
h1 { font-family:'Great+Vibes',cursive; text-align:center; color:#c41e3a; font-size:3rem; }
.reason { padding:15px; margin:10px 0; border-left:4px solid #c41e3a; background:#fff5f5; }
.reason-number { color:#c41e3a; font-weight:bold; }
</style>
</head>
<body>

<div id="envelope" onclick="showLetter()">
  <div class="envelope-box">❤️</div>
  <h2 style="margin-top:20px;font-family:'Great Vibes',cursive;font-size:2.5rem;color:#5c3d3d">Tap to Open My Heart</h2>
</div>

<div id="letter">
  <h1>My Dearest Love</h1>
  <p style="text-align:center;font-style:italic;margin-bottom:30px">To My Beautiful Girlfriend, June 5th 2026</p>
  <div id="reasons"></div>
  <p style="text-align:center;margin-top:40px;font-family:'Great Vibes',cursive;font-size:1.5rem;color:#c41e3a">Forever yours ❤️</p>
</div>

<script>
function showLetter(){
  document.getElementById('envelope').style.display='none';
  document.getElementById('letter').style.display='block';
  
  const lines = [
    "I ache for your touch because my hands feel empty without you",
    "I dream of holding you and forgetting distance ever existed", 
    "The miles hurt because I miss the warmth of your skin",
    "I count seconds knowing your hug will heal everything",
    "My heart races thinking of closing this gap and running to you",
    "Every night I imagine your arms making the world quiet",
    "I long for your touch like rain longs for the ocean",
    "Meeting you again will feel like coming home",
    "I crave your touch so deeply it keeps me awake",
    "The thought of your arms makes all waiting worth it"
  ];
  
  let html = '';
  for(let i=1; i<=100; i++){
    html += `<div class="reason"><span class="reason-number">${i}.</span> I love you because ${lines[i%10]}</div>`;
  }
  
  html += `<div style="margin-top:40px;padding:30px;background:#ffccd5;border-radius:12px;text-align:center;font-family:'Great Vibes',cursive;font-size:1.3rem">
  I know you didn't read through all that cotiepatotie:> but if you did just wow:0, saying I love you 100 times would've been boring now wouldn't it? So instead I wrote 100 reasons why I love you:)
  </div>`;
  
  document.getElementById('reasons').innerHTML = html;
}
</script>
</body>
</html>
